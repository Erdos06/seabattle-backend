server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  gemini:
    api-key: ${APP_GEMINI_API_KEY:}
    model: gemini-2.5-flash
  ipapi:
    base-url: http://ip-api.com/json/
